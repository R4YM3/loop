name: flow-tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  flow:
    name: flow-tests-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats tmux tmuxinator ruby git

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core tmux tmuxinator

      - name: Run flow tests
        run: tests/scripts/test-flow

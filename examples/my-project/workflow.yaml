name: my-workflow
root: /path/to/my-workflow

startup_window: web

windows:
  - web:
      root: .
      layout: main-vertical
      panes:
        - editor: 'nvim'
        - server: 'npm run dev || zsh -l'

  - api:
      root: .
      layout: main-vertical
      panes:
        - editor: 'nvim'
        - server: 'npm run server || zsh -l'

  - oo:
      root: ./.oo
      panes:
        - 'nvim || zsh -l'
